---
- name: Switch Active Deployment with Rollback
  hosts: webservers
  become: yes
  vars:
    active_version: green
    previous_version: blue

  tasks:

    - name: Set active container name
      set_fact:
        active_container: "{{ active_version }}_container"

    - name: Generate Nginx config
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "{{ playbook_dir }}/nginx.conf"

    - name: Restart Nginx proxy
      community.docker.docker_container:
        name: nginx_proxy
        state: started
        recreate: yes
        networks:
          - name: bluegreen_network
        ports:
          - "80:80"
        volumes:
          - "{{ playbook_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"

    - name: Wait for service to stabilize
      ansible.builtin.pause:
        seconds: 5

    - name: Comprehensive Health Check with Retry Logic
      block:
        - name: Basic connectivity check
          ansible.builtin.uri:
            url: "http://localhost"
            method: GET
            timeout: 10
            status_code: 200
          register: basic_health_check
          retries: 3
          delay: 2

        - name: Detailed health endpoint check
          ansible.builtin.uri:
            url: "http://localhost/health.html"
            method: GET
            timeout: 15
            status_code: 200
            return_content: yes
          register: detailed_health_check
          retries: 5
          delay: 3

        - name: Validate health response contains required fields
          ansible.builtin.assert:
            that:
              - "'healthy' in detailed_health_check.content"
              - "'version' in detailed_health_check.content"
              - "'timestamp' in detailed_health_check.content"
            fail_msg: "Health check response is missing required fields"

        - name: Performance validation check
          ansible.builtin.uri:
            url: "http://localhost"
            method: GET
            timeout: 5
            status_code: 200
          register: performance_check
          retries: 3
          delay: 1

        - name: Log successful health check
          ansible.builtin.debug:
            msg: "✅ Health check passed for {{ active_version }} version"

      rescue:
        - name: Log health check failure
          ansible.builtin.debug:
            msg: "❌ Health check failed for {{ active_version }} version, initiating rollback"
          
        - name: Set rollback container
          set_fact:
            active_container: "{{ previous_version }}_container"

        - name: Regenerate Nginx config for rollback
          ansible.builtin.template:
            src: templates/nginx.conf.j2
            dest: "{{ playbook_dir }}/nginx.conf"

        - name: Restart Nginx proxy for rollback
          community.docker.docker_container:
            name: nginx_proxy
            state: started
            recreate: yes
            networks:
              - name: bluegreen_network
            ports:
              - "80:80"
            volumes:
              - "{{ playbook_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
