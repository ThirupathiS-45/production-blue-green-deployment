<!DOCTYPE html>
<html>
<head>
    <title>Health Check - Green v2.0</title>
    <meta http-equiv="Content-Type" content="application/json">
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const healthData = {
        status: "healthy",
        version: "2.0.0", 
        environment: "green",
        timestamp: new Date().toISOString(),
        uptime: Math.floor(Math.random() * 86400), // Simulated uptime in seconds
        checks: {
            database: "ok",
            cache: "ok",
            external_api: "ok", 
            disk_space: "ok",
            new_feature_api: "ok"  // New feature in v2
        },
        metrics: {
            memory_usage: Math.floor(Math.random() * 80) + 10 + "%",
            cpu_usage: Math.floor(Math.random() * 50) + 5 + "%", 
            response_time_ms: Math.floor(Math.random() * 45) + 8, // Slightly better performance
            active_connections: Math.floor(Math.random() * 120) + 15
        },
        features: {
            new_dashboard: "enabled",
            enhanced_security: "enabled", 
            performance_optimizations: "enabled"
        }
    };

    // Set content type to JSON
    document.body.innerHTML = '<pre>' + JSON.stringify(healthData, null, 2) + '</pre>';
    document.body.style.fontFamily = 'monospace';
    document.body.style.backgroundColor = '#052e16';
    document.body.style.color = '#22c55e';
    document.body.style.padding = '20px';
});
</script>
</body>
</html>
