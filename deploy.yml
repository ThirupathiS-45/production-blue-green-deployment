---
- name: Blue-Green Docker Deployment
  hosts: webservers
  become: yes

  tasks:

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Create Docker network
      community.docker.docker_network:
        name: bluegreen_network

    - name: Build Blue Image
      community.docker.docker_image:
        name: blue_app
        source: build
        build:
          path: "{{ playbook_dir }}/app/v1"

    - name: Build Green Image
      community.docker.docker_image:
        name: green_app
        source: build
        build:
          path: "{{ playbook_dir }}/app/v2"

    - name: Run Blue Container
      community.docker.docker_container:
        name: blue_container
        image: blue_app
        state: started
        recreate: yes
        networks:
          - name: bluegreen_network
        published_ports:
          - "8081:80"

    - name: Run Green Container
      community.docker.docker_container:
        name: green_container
        image: green_app
        state: started
        recreate: yes
        networks:
          - name: bluegreen_network
        published_ports:
          - "8082:80"

    - name: Generate Nginx config for Blue (default)
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: "{{ playbook_dir }}/nginx.conf"
      vars:
        active_container: blue_container

    - name: Run Nginx Reverse Proxy Container
      community.docker.docker_container:
        name: nginx_proxy
        image: nginx:latest
        state: started
        recreate: yes
        networks:
          - name: bluegreen_network
        ports:
          - "80:80"
        volumes:
          - "{{ playbook_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
